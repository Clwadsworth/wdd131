<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Ticket Request</title>
    <link rel="icon" href="images/favicon.ico">
    <link rel="stylesheet" href="eventform.css" />
    <script src="eventform.js" defer></script>
</head>
<body>
    <main class="wrapper">
        <h1>Event Ticket</h1>

        <form id="etForm">
            <div class="field">
                <label for="firstName">First Name</label>
                <input id="firstName" name="firstName" type="text" required>
            </div>

            <div class="field">
                <label for="lastName">Last Name</label>
                <input id="lastName" name="lastName" type="text" required>
            </div>

            <div class="field full">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" required>
            </div>

            <div class="field">
                <label for="idForm">Type</label>
                <select
                    id="idForm"
                    name="idForm"
                    aria-controls="studentContainer"
                    required
                >
                    <option value="">Choose One</option>
                    <option value="student">Student</option>
                    <option value="guest">Guest</option>
                </select>
            </div>

            <div class="field">
                <label for="eventDate">Event Date</label>
                <input id="eventDate" name="eventDate" type="date" required/>
            </div>

            <div id="studentContainer" class="field full" hidden>
                <label for="std id">Student ID</label>
                <input id="std id" name="std id" type="text"/>
            </div>

            <div id="guestContainer" class="field full" hidden>
                <label for="gst id">Student ID</label>
                <input id="gst id" name="gst id" type="text"/>
            </div>
        </form>

        <section id="output" aria-live="polite"></section>
    </main>
</body>
</html>
