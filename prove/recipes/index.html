<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Book</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&display=swap" rel="stylesheet">
   
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Recipe Book">
    <meta property="og:description" content="A collection of recipes you can search through, browse, and try at home.">
    <meta property="og:url" content="https://clwadsworth.github.io/wdd131/prove/recipes/index.html">
    <meta property="og:image" content="images/apple-crisp.png">

    <!-- X Card -->
    <meta name="twitter:card" content="Social Preview Image">
    <meta name="twitter:title" content="Recipe Book">
    <meta name="twitter:description" content="A collection of recipes you can search through, browse, and try at home.">
    <meta name="twitter:image" content="images/apple-crisp.png">

    <!-- One favicon (ICO works everywhere) -->
    <!-- <link rel="icon" href="/favicon.ico">
    <link rel="icon" href="images/favicon.ico">  -->

    <!-- One Apple Touch Icon (iOS home screen) -->
    <!-- <link rel="apple-touch-icon" href="images/apple-touch-icon.png"> -->
    <script src="recipes.js" defer></script>           
    <link rel="stylesheet" href="recipes.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
</head>
<body>
    <header>
        <div class="logo">
            <img src="images/recipe-book.png" alt="Recipe Book logo">
            <h1>RecipeBook</h1>
        </div>
        <div class="search">
            <input type="text" id="search-input" placeholder="Find a recipe">
            <button id="search-button"><img src="images/search.svg" alt="search icon"></button>
        </div>
    </header>
    <main>
        <div class="recipe-container" id="recipe-container"></div>      
    </main>
    <footer>
        <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a>                   
        
    <div class="social">
     <!-- Social media icons provided under CC from https://www.iconfinder.com/ AlfredoCreates  -->
        <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
        <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
        <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
    </div>                  
                      
    </footer>
</body>
</html>
