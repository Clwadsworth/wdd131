<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Tracker Dashboard</title>
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <header>
        <div class="logo">
            <img src="images/check-money.png" alt="Budget Tracker logo">
            <h1>Budget Tracker</h1>
        </div>
        <nav class="main-nav">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="reports.html">Reports</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="summary">
            <div class="card">
                <h2>Total Spending</h2>
                <p id="total-spent">$277.72</p>
            </div>
            <div class="card">
                <h2>Budget Remaining</h2>
                <p id="budget-remaining">$57.28</p>
            </div>
            <div class="card">
                <h2>Categories</h2>
                <p id="categories">4</p>
            </div>
        </section>
    <button class="button" id="add-expense-button">Add Expense</button>
    <h3>Recent Transactions</h3>
    <div class="table-wrapper">
        <table>
            <thead>
            <tr>
                <th>Date</th>
                <th>Category</th>
                <th>Description</th>
                <th>Amount</th>
            </tr>
            </thead>
            <tbody id="recent-transactions">

            </tbody>
        </table>
    </div>
    <div id="expense-modal">
        <form id="expense-form">
            <div>
                <label for="category-selection">Category</label>
                <select id="category-selection">
                    <option>Food</option>
                    <option>Transportation</option>
                    <option>Dining</option>
                    <option>Entertainment</option>
                </select>
            </div>
            <div>
                <label for="amount">Amount</label>
                <input id="amount" type="number">
            </div>
            <div>
                <label for="description">Description</label>
                <input id="description" type="text">
            </div>
            <div>
                <label for="date">Date</label>
                <input id="date" type="date">
            </div>
            <div>
                <label for="account">Account</label>
                <input id="account" type="text">
            </div>
            <div>
                <button id="confirm" type="submit">Confirm</button>
                <button id="cancel-expense-button" type="button">Cancel</button>
            </div>
        </form>
    </div>
    </main>
<script type="module" src="index.js"></script>
</body>
</html>
